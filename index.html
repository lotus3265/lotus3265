<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Monitor de Portapapeles</title>

<style>
body{
font-family:Arial;
padding:40px;
background:#f5f5f5;
}

textarea{
width:100%;
height:150px;
font-size:16px;
padding:10px;
}
</style>
</head>

<body>

<h2>Texto copiado</h2>

<textarea id="clipboardBox"></textarea>

<script>

let ultimoTexto = ""

async function leerPortapapeles(){

try{

let text = await navigator.clipboard.readText()

if(text !== ultimoTexto){
ultimoTexto = text
document.getElementById("clipboardBox").value = text
}

}catch(e){
console.log("El navegador bloqueó el acceso al portapapeles")
}

}

/* revisar portapapeles cada segundo */
setInterval(leerPortapapeles,1000)

</script>

</body>
</html>
