<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Auto Clipboard Textbox</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 50px;
        }
        textarea {
            width: 100%;
            height: 200px;
            font-size: 16px;
        }
        p {
            color: gray;
        }
    </style>
</head>
<body>
    <h1>Actualización automática del portapapeles</h1>
    <p>Presiona <strong>Ctrl + C</strong> y el contenido copiado se mostrará aquí automáticamente.</p>
    <textarea id="clipboardBox" placeholder="El texto copiado aparecerá aquí..."></textarea>

    <script>
        const textarea = document.getElementById('clipboardBox');

        document.addEventListener('keydown', async (event) => {
            // Detecta Ctrl + C
            if (event.ctrlKey && event.key === 'c') {
                try {
                    // Intenta leer el contenido del portapapeles
                    const text = await navigator.clipboard.readText();
                    textarea.value = text;
                } catch (err) {
                    console.error('No se pudo leer el portapapeles:', err);
                }
            }
        });
    </script>
</body>
</html>
